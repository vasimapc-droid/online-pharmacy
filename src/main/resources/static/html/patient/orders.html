<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - MediCare</title>
    <link rel="stylesheet" href="../../../css/style.css">
    <style>
        .rx-warning {
            background: #fef3c7;
            border: 1px solid #f59e0b;
            border-radius: 8px;
            padding: 12px 16px;
            margin-top: 10px;
            color: #92400e;
        }
        .rx-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        .rx-badge.rx { background: #fee2e2; color: #991b1b; }
        .rx-badge.otc { background: #d1fae5; color: #065f46; }


        .pharmacy-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; background: #e0e7ff; color: #3730a3; margin-left: 5px; }
        .pharmacy-info { background: #f0f4ff; padding: 10px 15px; border-radius: 8px; margin-bottom: 15px; display: none; }
        .pharmacy-info.show { display: block; }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="logo-container">
        <img src="../../../images/logo.jpg" alt="MediCare Logo" class="logo-img" >

    </div>
    <div class="nav-links">
        <span id="userName"></span>
        <a href="#" onclick="logout()">Logout</a>
    </div>
</nav>

<div class="layout">
    <div class="sidebar">
        <a href="dashboard.html"> Dashboard</a>
        <a href="appointments.html"> Appointments</a>
        <a href="prescriptions.html"> Prescriptions</a>
        <a href="orders.html" class="active"> Orders</a>
        <a href="chat.html"> Chat</a>
    </div>

    <div class="main-content">
        <h1>My Orders</h1>

        <div class="card" style="margin-top:20px;">
            <h2>Place New Order</h2>
            <form id="orderForm">
                <div class="form-group">
                    <label>Select Pharmacy <span style="color:red;">*</span></label>
                    <select id="pharmacySelect" required>
                        <option value="">Loading pharmacies...</option>
                    </select>
                    <small style="color:#64748b;">Choose your preferred pharmacy</small>
                </div>
                <div class="pharmacy-info" id="pharmacyInfo">
                    <strong> <span id="pharmacyName"></span></strong>
                    <span style="color:#64748b; margin-left:10px;" id="pharmacyAddress"></span>
                </div>
                <div class="form-group">
                    <label>Select Medicine <span style="color:red;">*</span></label>
                    <select id="medicineSelect" required>
                        <option value="">Select pharmacy first...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Quantity <span style="color:red;">*</span></label>
                    <input type="number" id="quantity" min="1" value="1" required>
                </div>
                <div class="form-group">
                    <label>Delivery Address <span style="color:red;">*</span></label>
                    <textarea id="deliveryAddress" rows="3" placeholder="Enter your complete address" required></textarea>
                </div>
                <div id="rxWarning" style="display:none;"></div>
                <button type="submit" class="btn btn-primary">Place Order</button>
            </form>
            <div id="orderMsg" style="margin-top:10px;"></div>
        </div>

        <div class="card">
            <h2>Order History</h2>
            <table>
                <thead><tr><th>Medicine</th><th>Type</th><th>Qty</th><th>Price</th><th>Pharmacy</th><th>Address</th><th>Date</th><th>Status</th><th>Action</th></tr></thead>
                <tbody id="ordersTable"><tr><td colspan="9" class="text-center">Loading...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    console.log('=== Orders page loaded ===');

    const user = JSON.parse(localStorage.getItem('user'));
    if (!user || user.role !== 'PATIENT') window.location.href = '../login.html';
    document.getElementById('userName').textContent = user.fullName;
    console.log('User:', user.fullName, 'ID:', user.id);

    async function loadPharmacies() {
        try {
            console.log('Loading pharmacies...');
            const res = await fetch('http://localhost:8080/api/admin/pharmacies');
            const pharmacies = await res.json();
            console.log('Pharmacies loaded:', pharmacies.length);

            const select = document.getElementById('pharmacySelect');
            if (pharmacies.length === 0) {
                select.innerHTML = '<option value="">No pharmacies available</option>';
                return;
            }
            select.innerHTML = '<option value="">Select a pharmacy</option>' +
                pharmacies.map(p => `<option value="${p.id}" data-name="${p.pharmacyName || p.fullName}" data-address="${p.address || ''}">💊 ${p.pharmacyName || p.fullName}</option>`).join('');
            window.pharmaciesList = pharmacies;
            console.log('Pharmacy dropdown populated');
        } catch (err) {
            console.error('Load pharmacies error:', err);
        }
    }

    async function loadMedicines(pharmacyId) {
        const medicineSelect = document.getElementById('medicineSelect');
        console.log('loadMedicines called with ID:', pharmacyId);

        if (!pharmacyId) {
            medicineSelect.innerHTML = '<option value="">Select pharmacy first...</option>';
            return;
        }

        medicineSelect.innerHTML = '<option value="">Loading...</option>';

        try {
            const url = `http://localhost:8080/api/medicines/pharmacy/${pharmacyId}`;
            console.log('Fetching:', url);

            const res = await fetch(url);
            console.log('Response:', res.status);

            const medicines = await res.json();
            console.log('Medicines found:', medicines.length);

            if (!medicines || medicines.length === 0) {
                medicineSelect.innerHTML = '<option value="">No medicines at this pharmacy</option>';
                return;
            }

            medicineSelect.innerHTML = '<option value="">Select a medicine</option>' +
                medicines.map(m => `<option value="${m.id}">${m.requiresPrescription ? '🔒' : '🟢'} ${m.name} - ₹${m.price} (Stock: ${m.stockQuantity})</option>`).join('');

            window.medicinesList = medicines;
            console.log('Medicine dropdown updated with', medicines.length, 'items');
        } catch (err) {
            console.error('Load medicines error:', err);
            medicineSelect.innerHTML = '<option value="">Error loading</option>';
        }
    }

    // Pharmacy change event
    document.getElementById('pharmacySelect').addEventListener('change', function() {
        const pharmacyId = this.value;
        console.log('=== Pharmacy changed ===');
        console.log('Selected ID:', pharmacyId);

        if (pharmacyId) {
            const opt = this.options[this.selectedIndex];
            const name = opt.getAttribute('data-name');
            const address = opt.getAttribute('data-address');
            console.log('Name:', name, 'Address:', address);

            document.getElementById('pharmacyName').textContent = name || '';
            document.getElementById('pharmacyAddress').textContent = address || '';
            document.getElementById('pharmacyInfo').classList.add('show');

            console.log('Calling loadMedicines...');
            loadMedicines(pharmacyId);
        } else {
            document.getElementById('pharmacyInfo').classList.remove('show');
            document.getElementById('medicineSelect').innerHTML = '<option value="">Select pharmacy first...</option>';
        }
        document.getElementById('rxWarning').style.display = 'none';
        document.getElementById('orderMsg').innerHTML = '';
    });

    // Medicine change - Rx warning
    document.getElementById('medicineSelect').addEventListener('change', function() {
        const medicineId = this.value;
        if (!medicineId || !window.medicinesList) return;
        const selected = window.medicinesList.find(m => m.id == medicineId);
        const rxWarning = document.getElementById('rxWarning');
        if (selected && selected.requiresPrescription) {
            rxWarning.style.display = 'block';
            rxWarning.innerHTML = `<div class="rx-warning">⚠️ <strong>Prescription Required!</strong><br>${selected.name} requires a valid prescription.<br><a href="appointments.html" style="color:#1a73e8;">📅 Book a doctor consultation →</a></div>`;
        } else {
            rxWarning.style.display = 'none';
        }
    });

    async function loadOrders() {
        const tbody = document.getElementById('ordersTable');
        try {
            const res = await fetch(`http://localhost:8080/api/orders/patient/${user.id}`);
            const orders = await res.json();
            if (!orders || orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="text-center">📭 No orders yet</td></tr>';
                return;
            }
            tbody.innerHTML = orders.reverse().map(o => `
                <tr>
                    <td><strong>${o.medicineName}</strong></td>
                    <td><span class="rx-badge ${o.requiresPrescription ? 'rx' : 'otc'}">${o.requiresPrescription ? '🔒 Rx' : '🟢 OTC'}</span></td>
                    <td>${o.quantity}</td>
                    <td>₹${o.totalPrice}</td>
                    <td><span class="pharmacy-badge">💊 ${o.pharmacyName || 'N/A'}</span></td>
                    <td><small>📍 ${o.deliveryAddress ? o.deliveryAddress.substring(0, 20) + '...' : 'N/A'}</small></td>
                    <td>${new Date(o.orderDate).toLocaleDateString()}</td>
                    <td><span class="badge badge-${o.status.toLowerCase()}">${o.status}</span></td>
                    <td>${o.status === 'PENDING' ? `<a href="payment.html?orderId=${o.id}&amount=${o.totalPrice}" class="btn btn-success" style="padding:5px 10px;font-size:12px;">💳 Pay</a>` : o.status === 'DELIVERED' ? '✅' : '—'}</td>
                </tr>`).join('');
        } catch (err) {
            tbody.innerHTML = '<tr><td colspan="9" class="text-center" style="color:red;">Error loading orders</td></tr>';
        }
    }

    document.getElementById('orderForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = document.getElementById('orderMsg');
        const pharmacyId = document.getElementById('pharmacySelect').value;
        const medicineId = document.getElementById('medicineSelect').value;
        const quantity = parseInt(document.getElementById('quantity').value);
        const address = document.getElementById('deliveryAddress').value.trim();

        if (!pharmacyId) { msg.innerHTML = '<div class="alert alert-error">❌ Select a pharmacy</div>'; return; }
        if (!medicineId) { msg.innerHTML = '<div class="alert alert-error">❌ Select a medicine</div>'; return; }
        if (!quantity || quantity < 1) { msg.innerHTML = '<div class="alert alert-error">❌ Invalid quantity</div>'; return; }
        if (!address || address.length < 10) { msg.innerHTML = '<div class="alert alert-error">❌ Enter address</div>'; return; }

        try {
            const res = await fetch('http://localhost:8080/api/orders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ patientId: user.id, medicineId: medicineId, quantity: quantity, deliveryAddress: address })
            });
            const data = await res.json();
            if (res.ok) {
                msg.innerHTML = `<div class="alert alert-success">✅ Order placed! ${data.medicineName} x${data.quantity} - ₹${data.totalPrice}</div>`;
                document.getElementById('orderForm').reset();
                document.getElementById('rxWarning').style.display = 'none';
                document.getElementById('pharmacyInfo').classList.remove('show');
                document.getElementById('medicineSelect').innerHTML = '<option value="">Select pharmacy first...</option>';
                loadOrders();
            } else {
                msg.innerHTML = `<div class="alert alert-error">❌ ${data.error || 'Order failed'}</div>`;
            }
        } catch (err) {
            msg.innerHTML = '<div class="alert alert-error">❌ Server error</div>';
        }
    });

    function logout() { localStorage.clear(); window.location.href = '../login.html'; }

    loadPharmacies();
    loadOrders();
</script>
</body>
</html>
