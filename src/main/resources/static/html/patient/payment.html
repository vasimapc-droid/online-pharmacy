<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - MediCare</title>
    <link rel="stylesheet" href="../../../css/style.css">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="logo-container">
        <img src="../../images/logo.jpg" alt="MediCare Logo" class="logo-img">
        <!--        <span class="logo-text">MediCare</span>-->
    </div>
    <div class="nav-links">
        <span id="userName"></span>
        <a href="#" onclick="logout()">Logout</a>
    </div>
</nav>

<div class="layout">
    <div class="sidebar">
        <a href="dashboard.html"> Dashboard</a>
        <a href="appointments.html"> Appointments</a>
        <a href="prescriptions.html"> Prescriptions</a>
        <a href="orders.html" class="active"> Orders</a>
        <a href="chat.html"> Chat</a>
    </div>

    <div class="main-content">
        <div style="max-width:500px; margin:0 auto;">
            <div class="card text-center">
                <h2>💳 Complete Payment</h2>
                <p style="margin:15px 0; font-size:18px;">Amount: <strong>₹<span id="amount"></span></strong></p>
                <p style="margin:15px 0; color:#64748b;">Order #<span id="orderInfo"></span></p>

                <button class="btn btn-primary" style="width:100%; padding:15px; font-size:16px;" onclick="demoPayment()">
                    ✅ Pay Now (Demo)
                </button>

                <div style="margin-top:15px; padding:15px; background:#f0fdf4; border-radius:8px;">
                    <p style="color:#065f46; font-size:13px;">
                        💡 This is a demo payment. In production, Razorpay/Stripe will be integrated.
                    </p>
                </div>

                <div id="paymentMsg" style="margin-top:15px; font-weight:bold;"></div>
            </div>
        </div>
    </div>
</div>
<script src="../../js/config.js"></script>
<script>
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user) window.location.href = '../login.html';
    document.getElementById('userName').textContent = user.fullName;

    const params = new URLSearchParams(window.location.search);
    const amount = params.get('amount') || '100';
    const orderId = params.get('orderId') || '1';

    document.getElementById('amount').textContent = amount;
    document.getElementById('orderInfo').textContent = orderId;

    window.demoPayment = async function() {
        document.getElementById('paymentMsg').innerHTML =
            '<span style="color:green;"> Processing payment...</span>';

        try {
            await fetch(`http://localhost:8080/api/orders/${orderId}/status`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'CONFIRMED' })
            });

            document.getElementById('paymentMsg').innerHTML =
                '<span style="color:green;">✅ Payment Successful!<br>Order Confirmed.<br>Redirecting...</span>';

            setTimeout(() => {
                window.location.href = 'orders.html';
            }, 2000);
        } catch (err) {
            document.getElementById('paymentMsg').innerHTML =
                '<span style="color:red;">❌ Payment failed. Try again.</span>';
        }
    };

    function logout() {
        localStorage.clear();
        window.location.href = '../login.html';
    }
</script>
</body>
</html>
