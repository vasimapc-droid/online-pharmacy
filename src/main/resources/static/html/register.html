<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MediCare</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
<nav class="navbar">
    <div class="logo-container">
        <img src="../../images/logo.jpg" alt="MediCare Logo" class="logo-img">
        <!--        <span class="logo-text">MediCare</span>-->
    </div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
    </div>
</nav>

<div class="container" style="max-width: 500px; margin-top: 40px;">
    <div class="card">
        <h2 class="text-center">Register</h2>
        <form id="registerForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Enter full name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" id="phone" placeholder="Enter phone number">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="role" required>
                    <option value="">Select Role</option>
                    <option value="PATIENT">Patient</option>
                    <option value="DOCTOR">Doctor</option>
                    <option value="PHARMACY">Pharmacy</option>
                </select>
            </div>
            <!-- Doctor Fields -->
            <div id="doctorFields" class="hidden">
                <div class="form-group">
                    <label>Specialty</label>
                    <input type="text" id="specialty" placeholder="e.g., General Medicine">
                </div>
                <div class="form-group">
                    <label>License Number</label>
                    <input type="text" id="licenseNumber" placeholder="Enter license number">
                </div>
            </div>
            <!-- Pharmacy Fields -->
            <div id="pharmacyFields" class="hidden">
                <div class="form-group">
                    <label>Pharmacy Name</label>
                    <input type="text" id="pharmacyName" placeholder="Enter pharmacy name">
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <textarea id="address" placeholder="Enter address" rows="2"></textarea>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Register</button>
        </form>
        <p class="text-center mt-20">Already have an account? <a href="login.html">Login</a></p>
        <div id="errorMsg" style="color:red; text-align:center; margin-top:10px;"></div>
        <div id="successMsg" style="color:green; text-align:center; margin-top:10px;"></div>
    </div>
</div>
<script src="../../js/config.js"></script>
<script>
    document.getElementById('role').addEventListener('change', function() {
        const role = this.value;
        document.getElementById('doctorFields').classList.toggle('hidden', role !== 'DOCTOR');
        document.getElementById('pharmacyFields').classList.toggle('hidden', role !== 'PHARMACY');
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const body = {
            fullName: document.getElementById('fullName').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            role: document.getElementById('role').value,
            phone: document.getElementById('phone').value
        };

        if (body.role === 'DOCTOR') {
            body.specialty = document.getElementById('specialty').value;
            body.licenseNumber = document.getElementById('licenseNumber').value;
        }
        if (body.role === 'PHARMACY') {
            body.pharmacyName = document.getElementById('pharmacyName').value;
            body.address = document.getElementById('address').value;
        }

        try {
            const res = await fetch('http://localhost:8080/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            const data = await res.json();

            if (res.ok) {
                document.getElementById('successMsg').textContent = 'Registration successful! Redirecting to login...';
                document.getElementById('errorMsg').textContent = '';
                setTimeout(() => window.location.href = 'login.html', 1500);
            } else {
                document.getElementById('errorMsg').textContent = data.error || 'Registration failed';
                document.getElementById('successMsg').textContent = '';
            }
        } catch (err) {
            document.getElementById('errorMsg').textContent = 'Server error. Is backend running?';
        }
    });
</script>
</body>
</html>
