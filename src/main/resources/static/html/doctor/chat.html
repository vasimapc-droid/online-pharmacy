<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Patients - MediCare</title>
    <link rel="stylesheet" href="../../../css/style.css">
    <style>
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            width: 250px;
            height: 70px;
            border-radius: 8px;
            object-fit: contain;

        }

        .logo-text {
            font-size: 22px;
            font-weight: bold;
            color: white;
        }

        /* Larger logo for landing page */
        .hero-logo {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            border-radius: 20px;
            object-fit: contain;
        }

        /* Logo in login/register cards */
        .card-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
            display: block;
            border-radius: 12px;
        }
        .chat-layout { display: flex; gap: 20px; height: calc(100vh - 140px); }
        .patient-list {
            width: 280px; background: white; border-radius: 12px;
            padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow-y: auto;
        }
        .patient-list h3 { margin-bottom: 15px; color: #1a73e8; }
        .patient-item {
            padding: 12px 15px; border-radius: 8px; cursor: pointer;
            margin-bottom: 8px; border: 1px solid #e2e8f0; transition: 0.2s;
        }
        .patient-item:hover { background: #f0f4ff; border-color: #1a73e8; }
        .patient-item.active { background: #1a73e8; color: white; border-color: #1a73e8; }
        .patient-item .patient-name { font-weight: 600; }
        .patient-item .appt-info { font-size: 12px; color: #64748b; margin-top: 4px; }
        .patient-item.active .appt-info { color: #e2e8f0; }
        .chat-area {
            flex: 1; background: white; border-radius: 12px;
            padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex; flex-direction: column;
        }
        .messages-box {
            flex: 1; overflow-y: auto; border: 1px solid #e2e8f0;
            border-radius: 12px; padding: 20px; background: #f8fafc; margin-bottom: 15px;
        }
        .message { margin-bottom: 12px; padding: 10px 16px; border-radius: 12px; max-width: 70%; word-wrap: break-word; }
        .message.sent { background: #1a73e8; color: white; margin-left: auto; text-align: right; }
        .message.received { background: white; border: 1px solid #e2e8f0; }
        .message .msg-sender { font-size: 12px; font-weight: bold; margin-bottom: 3px; }
        .message .msg-time { font-size: 11px; opacity: 0.7; margin-top: 4px; }
        .chat-input { display: flex; gap: 10px; }
        .chat-input input { flex: 1; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 15px; }
        .no-selection { text-align: center; padding: 60px 20px; color: #64748b; }
        .empty-state { text-align: center; padding: 30px; color: #94a3b8; }
        .chat-header { padding: 10px 15px; background: #f0f4ff; border-radius: 8px; margin-bottom: 15px; }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="logo-container">
        <img src="../../images/logo.jpg" alt="MediCare Logo" class="logo-img">
        <!--        <span class="logo-text">MediCare</span>-->
    </div>
    <div class="nav-links">
        <span id="userName"></span>
        <a href="#" onclick="logout()">Logout</a>
    </div>
</nav>

<div class="layout">
    <div class="sidebar">
        <a href="dashboard.html"> Dashboard</a>
        <a href="appointments.html"> Appointments</a>
        <a href="write-prescription.html"> Write Prescription</a>
        <a href="chat.html" class="active"> Chat</a>
    </div>

    <div class="main-content">
        <h1> Patient Chats</h1>
        <p style="color:#64748b; margin-bottom:20px;">Patients who have booked appointments with you</p>

        <div class="chat-layout">
            <div class="patient-list" id="patientList">
                <h3> Your Patients</h3>
                <div id="patientItems">
                    <div class="empty-state">Loading patients...</div>
                </div>
            </div>

            <div class="chat-area" id="chatArea">
                <div class="no-selection" id="noSelection">
                    <h3> Select a patient</h3>
                    <p>Click on a patient from the list to view your conversation</p>
                </div>

                <div id="activeChat" style="display:none; flex-direction:column; flex:1;">
                    <div class="chat-header">
                        <strong>Chatting with: <span id="chatPatientName"></span></strong>
                        <span style="color:#64748b; margin-left:10px; font-size:13px;" id="chatApptInfo"></span>
                    </div>
                    <div class="messages-box" id="messagesBox">
                        <p style="text-align:center; color:#94a3b8;">No messages yet</p>
                    </div>
                    <div class="chat-input">
                        <input type="text" id="messageInput" placeholder="Type your response..."
                               onkeypress="if(event.key==='Enter') sendMessage()">
                        <button class="btn btn-primary" onclick="sendMessage()">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user || user.role !== 'DOCTOR') window.location.href = '../login.html';
    document.getElementById('userName').textContent = 'Dr. ' + user.fullName;

    let currentPatientId = null;
    let currentAppointmentId = null;
    let currentPatientName = null;
    let refreshInterval = null;

    async function loadPatients() {
        try {
            const res = await fetch(`http://localhost:8080/api/appointments/doctor/${user.id}`);
            const appointments = await res.json();
            const container = document.getElementById('patientItems');

            if (!appointments || appointments.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 No patients yet</div>';
                return;
            }

            const uniquePatients = [];
            const seenIds = new Set();

            for (const appt of appointments) {
                const pid = appt.patientId || appt.patientName;
                if (!seenIds.has(pid)) {
                    seenIds.add(pid);
                    uniquePatients.push(appt);
                }
            }

            container.innerHTML = uniquePatients.map((appt, index) => `
                    <div class="patient-item" id="patient-${index}"
                        onclick="selectPatient('${appt.patientName}', ${appt.patientId}, ${appt.id}, ${index})">
                        <div class="patient-name">👤 ${appt.patientName}</div>
                        <div class="appt-info">
                            📅 ${new Date(appt.appointmentDate).toLocaleDateString()} | ${appt.status}
                        </div>
                    </div>
                `).join('');

        } catch (err) {
            console.error('Load patients error:', err);
        }
    }

    function selectPatient(patientName, patientId, appointmentId, index) {
        currentPatientId = patientId;
        currentAppointmentId = appointmentId;
        currentPatientName = patientName;

        document.getElementById('chatPatientName').textContent = patientName;
        document.getElementById('chatApptInfo').textContent = 'Appointment #' + appointmentId;

        document.querySelectorAll('.patient-item').forEach(i => i.classList.remove('active'));
        const item = document.getElementById('patient-' + index);
        if (item) item.classList.add('active');

        document.getElementById('noSelection').style.display = 'none';
        document.getElementById('activeChat').style.display = 'flex';

        loadMessages();

        if (refreshInterval) clearInterval(refreshInterval);
        refreshInterval = setInterval(loadMessages, 2000);
    }

    async function loadMessages() {
        if (!currentPatientId) return;

        try {
            const res = await fetch(
                `http://localhost:8080/api/messages/conversation?user1=${user.id}&user2=${currentPatientId}`
            );
            const messages = await res.json();
            const box = document.getElementById('messagesBox');

            if (!messages || messages.length === 0) {
                box.innerHTML = '<p style="text-align:center; color:#94a3b8;">No messages yet. Waiting for patient...</p>';
                return;
            }

            box.innerHTML = messages.map(m => `
                    <div class="message ${m.senderId === user.id ? 'sent' : 'received'}">
                        <div class="msg-sender">${m.senderId === user.id ? 'You' : m.senderName}</div>
                        <div>${m.content}</div>
                        <div class="msg-time">${new Date(m.sentAt).toLocaleTimeString()}</div>
                    </div>
                `).join('');

            box.scrollTop = box.scrollHeight;
        } catch (err) {
            console.error('Load messages error:', err);
        }
    }

    window.sendMessage = async function() {
        if (!currentPatientId) return;

        const input = document.getElementById('messageInput');
        const content = input.value.trim();
        if (!content) return;

        try {
            const res = await fetch('http://localhost:8080/api/messages', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    senderId: user.id,
                    receiverId: currentPatientId,
                    appointmentId: currentAppointmentId,
                    content: content
                })
            });

            if (res.ok) {
                input.value = '';
                loadMessages(); // Reload immediately
            }
        } catch (err) {
            console.error('Send error:', err);
        }
    };

    function logout() {
        if (refreshInterval) clearInterval(refreshInterval);
        localStorage.clear();
        window.location.href = '../login.html';
    }

    loadPatients();
</script>
</body>
</html>
