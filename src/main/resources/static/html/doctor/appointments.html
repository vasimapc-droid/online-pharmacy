<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointments - MediCare</title>
    <link rel="stylesheet" href="../../../css/style.css">
</head>
<body>
<nav class="navbar">
    <div class="logo-container">
        <img src="../../images/logo.jpg" alt="MediCare Logo" class="logo-img">
        <!--        <span class="logo-text">MediCare</span>-->
    </div>
    <div class="nav-links">
        <span id="userName"></span>
        <a href="#" onclick="logout()">Logout</a>
    </div>
</nav>

<div class="layout">
    <div class="sidebar">
        <a href="dashboard.html"> Dashboard</a>
        <a href="appointments.html" class="active"> Appointments</a>
        <a href="write-prescription.html"> Write Prescription</a>
        <a href="chat.html"> Chat</a>
    </div>

    <div class="main-content">
        <h1>My Appointments</h1>

        <div class="card" style="margin-top:20px;">
            <h2>All Appointments</h2>
            <table>
                <thead>
                <tr>
                    <th>Patient</th>
                    <th>Date & Time</th>
                    <th>Reason</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody id="appointmentsTable">
                <tr><td colspan="5" class="text-center">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="../../js/config.js"></script>
<script>
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user || user.role !== 'DOCTOR') window.location.href = '../login.html';
    document.getElementById('userName').textContent = 'Dr. ' + user.fullName;

    async function loadAppointments() {
        try {
            const res = await fetch(`http://localhost:8080/api/appointments/doctor/${user.id}`);
            const appointments = await res.json();
            const tbody = document.getElementById('appointmentsTable');

            if (appointments.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center">No appointments</td></tr>';
                return;
            }

            tbody.innerHTML = appointments.map(a => `
                    <tr>
                        <td>${a.patientName}</td>
                        <td>${new Date(a.appointmentDate).toLocaleString()}</td>
                        <td>${a.reason}</td>
                        <td><span class="badge badge-${a.status.toLowerCase()}">${a.status}</span></td>
                        <td>
                            ${a.status === 'BOOKED' ?
                `<a href="write-prescription.html?apptId=${a.id}&patientName=${a.patientName}"
                                    class="btn btn-primary" style="padding:5px 12px;font-size:13px;">Write Rx</a>` :
                '—'}
                        </td>
                    </tr>
                `).join('');
        } catch (err) {
            console.error(err);
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = '../login.html';
    }

    loadAppointments();
</script>
</body>
</html>
