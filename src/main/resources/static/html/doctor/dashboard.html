<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard - MediCare</title>
    <link rel="stylesheet" href="../../../css/style.css">
</head>
<body>
<nav class="navbar">
    <div class="logo-container">
        <img src="../../images/logo.jpg" alt="MediCare Logo" class="logo-img">
        <!--        <span class="logo-text">MediCare</span>-->
    </div>
    <div class="nav-links">
        <span id="userName"></span>
        <a href="#" onclick="logout()">Logout</a>
    </div>
</nav>

<div class="layout">
    <div class="sidebar">
        <a href="dashboard.html" class="active"> Dashboard</a>
        <a href="appointments.html"> Appointments</a>
        <a href="write-prescription.html"> Write Prescription</a>
        <a href="chat.html"> Chat</a>
    </div>

    <div class="main-content">
        <h1>Welcome, Dr. <span id="doctorName"></span>!</h1>

        <div class="stats-row" style="margin-top:25px;">
            <div class="stat-card">
                <h3 id="apptCount">0</h3>
                <p>Today's Appointments</p>
            </div>
            <div class="stat-card">
                <h3 id="prescCount">0</h3>
                <p>Prescriptions Issued</p>
            </div>
            <div class="stat-card">
                <h3 id="totalAppt">0</h3>
                <p>Total Appointments</p>
            </div>
        </div>

        <div class="card">
            <h2>Quick Actions</h2>
            <a href="appointments.html" class="btn btn-primary">View Appointments</a>
            <a href="write-prescription.html" class="btn btn-success" style="margin-left:10px;">Write Prescription</a>
        </div>
    </div>
</div>
<script src="../../js/config.js"></script>
<script>
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user || user.role !== 'DOCTOR') window.location.href = '../login.html';

    document.getElementById('doctorName').textContent = user.fullName;
    document.getElementById('userName').textContent = 'Dr. ' + user.fullName;

    async function loadStats() {
        try {
            const res = await fetch(`http://localhost:8080/api/appointments/doctor/${user.id}`);
            const appts = await res.json();
            document.getElementById('totalAppt').textContent = appts.length;
            document.getElementById('apptCount').textContent = appts.filter(a =>
                new Date(a.appointmentDate).toDateString() === new Date().toDateString()
            ).length;

            const prescRes = await fetch(`http://localhost:8080/api/prescriptions/doctor/${user.id}`);
            const prescs = await prescRes.json();
            document.getElementById('prescCount').textContent = prescs.length;
        } catch (err) {
            console.error(err);
        }
    }

    loadStats();

    function logout() {
        localStorage.clear();
        window.location.href = '../login.html';
    }
</script>
</body>
</html>
