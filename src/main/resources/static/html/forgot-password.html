<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - MediCare</title>
    <link rel="stylesheet" href="../../css/style.css">

</head>
<body>
<nav class="navbar">
    <div class="logo-container">
        <img src="../../images/logo.jpg" alt="MediCare Logo" class="logo-img" onerror="this.style.display='none'">

    </div>
    <div class="nav-links">
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
    </div>
</nav>

<div class="container" style="max-width: 450px; margin-top: 60px;">
    <div class="card">
        <div style="text-align:center; margin-bottom:20px;">
            <img src="../../images/logo.jpg" alt="MediCare" style="width:150px;height:70px;border-radius:12px;" onerror="this.style.display='none'">
        </div>
        <h2 class="text-center">Forgot Password</h2>
        <p class="text-center" style="color:#64748b; margin-bottom:20px;">
            Enter your email to receive a password reset link.
        </p>

        <!-- Step 1: Enter Email -->
        <div id="step1">
            <form id="forgotForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="Enter your registered email" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">Send Reset Link</button>
            </form>
            <div id="forgotMsg" style="margin-top:10px; text-align:center;"></div>
        </div>

        <!-- Step 2: Reset Password -->
        <div id="step2" style="display:none;">
            <div style="background:#f0fdf4; padding:15px; border-radius:8px; margin-bottom:15px;">
                <p style="color:#065f46; margin:0; font-size:14px;">
                    ✅ Reset token generated! Enter a new password below.
                </p>
            </div>
            <form id="resetForm">
                <div class="form-group">
                    <label>Reset Token</label>
                    <input type="text" id="token" placeholder="Reset token" required readonly>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newPassword" placeholder="Enter new password (min 6 characters)" required minlength="6">
                </div>
                <button type="submit" class="btn btn-success" style="width:100%;">Reset Password</button>
            </form>
            <div id="resetMsg" style="margin-top:10px; text-align:center;"></div>
        </div>

        <p class="text-center mt-20">
            <a href="login.html">← Back to Login</a>
        </p>
    </div>
</div>

<script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = document.getElementById('forgotMsg');
        const email = document.getElementById('email').value;

        msg.innerHTML = '<div class="spinner-container"><div class="spinner"></div><p>Sending reset link...</p></div>';

        try {
            const res = await fetch('http://localhost:8080/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            });

            const data = await res.json();

            if (res.ok) {
                msg.innerHTML = '';
                document.getElementById('step1').style.display = 'none';
                document.getElementById('step2').style.display = 'block';
                document.getElementById('token').value = data.resetToken;
            } else {
                msg.innerHTML = `<div class="alert alert-error">❌ ${data.error}</div>`;
            }
        } catch (err) {
            msg.innerHTML = '<div class="alert alert-error">❌ Server error. Please try again.</div>';
        }
    });

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = document.getElementById('resetMsg');
        const token = document.getElementById('token').value;
        const newPassword = document.getElementById('newPassword').value;

        if (newPassword.length < 6) {
            msg.innerHTML = '<div class="alert alert-error">❌ Password must be at least 6 characters</div>';
            return;
        }

        msg.innerHTML = '<div class="spinner-container"><div class="spinner"></div><p>Resetting password...</p></div>';

        try {
            const res = await fetch('http://localhost:8080/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token, newPassword: newPassword })
            });

            const data = await res.json();

            if (res.ok) {
                msg.innerHTML = `<div class="alert alert-success">
                        ✅ ${data.message}<br>
                        <a href="login.html" style="margin-top:10px;display:inline-block;color:#1a73e8;font-weight:600;">Go to Login →</a>
                    </div>`;
                document.getElementById('resetForm').style.display = 'none';
            } else {
                msg.innerHTML = `<div class="alert alert-error">❌ ${data.error}</div>`;
            }
        } catch (err) {
            msg.innerHTML = '<div class="alert alert-error">❌ Server error. Please try again.</div>';
        }
    });
</script>
</body>
</html>
