<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory - MediCare</title>
    <link rel="stylesheet" href="../../../css/style.css">
</head>
<body>
<nav class="navbar">
    <div class="logo-container">
        <img src="../../images/logo.jpg" alt="MediCare Logo" class="logo-img">
        <!--        <span class="logo-text">MediCare</span>-->
    </div>
    <div class="nav-links">
        <span id="userName"></span>
        <a href="#" onclick="logout()">Logout</a>
    </div>
</nav>

<div class="layout">
    <div class="sidebar">
        <a href="dashboard.html"> Dashboard</a>
        <a href="inventory.html" class="active"> Inventory</a>
        <a href="orders.html"> Orders</a>
    </div>

    <div class="main-content">
        <h1>Medicine Inventory</h1>

        <!-- Add Medicine -->
        <div class="card" style="margin-top:20px;">
            <h2>Add New Medicine</h2>
            <form id="medicineForm" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                <div class="form-group">
                    <label>Medicine Name</label>
                    <input type="text" id="medName" placeholder="e.g., Paracetamol 500mg" required>
                </div>
                <div class="form-group">
                    <label>Price (₹)</label>
                    <input type="number" id="medPrice" placeholder="25.00" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Stock Quantity</label>
                    <input type="number" id="medStock" placeholder="100" required>
                </div>
                <div class="form-group">
                    <label>Requires Prescription?</label>
                    <select id="medRx">
                        <option value="false">No (OTC)</option>
                        <option value="true">Yes (Rx Only)</option>
                    </select>
                </div>
                <div class="form-group" style="grid-column:span 2;">
                    <label>Description</label>
                    <input type="text" id="medDesc" placeholder="e.g., For fever and pain relief">
                </div>
                <button type="submit" class="btn btn-primary" style="grid-column:span 2;">Add Medicine</button>
            </form>
            <div id="medMsg" style="margin-top:10px; text-align:center;"></div>
        </div>

        <!-- Inventory List -->
        <div class="card">
            <h2>Current Stock</h2>
            <table>
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Rx Required</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody id="inventoryTable">
                <tr><td colspan="5" class="text-center">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="../../js/config.js"></script>
<script>
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user || user.role !== 'PHARMACY') window.location.href = '../login.html';
    document.getElementById('userName').textContent = user.pharmacyName || user.fullName;

    async function loadInventory() {
        try {
            const res = await fetch('http://localhost:8080/api/medicines');
            const medicines = await res.json();
            const tbody = document.getElementById('inventoryTable');

            if (medicines.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center">No medicines in stock</td></tr>';
                return;
            }

            tbody.innerHTML = medicines.map(m => `
                    <tr>
                        <td>${m.name}</td>
                        <td>₹${m.price}</td>
                        <td style="color:${m.stockQuantity < 10 ? 'red' : 'green'}; font-weight:bold;">
                            ${m.stockQuantity}
                        </td>
                        <td>${m.requiresPrescription ? '🔒 Rx' : '🟢 OTC'}</td>
                        <td>
                            <button class="btn btn-primary" style="padding:5px 12px;font-size:13px;"
                                onclick="updateStock(${m.id}, '${m.name}', ${m.stockQuantity})">Update Stock</button>
                        </td>
                    </tr>
                `).join('');
        } catch (err) {
            console.error(err);
        }
    }

    document.getElementById('medicineForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = document.getElementById('medMsg');

        try {
            const res = await fetch('http://localhost:8080/api/medicines', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    pharmacyId: user.id,
                    name: document.getElementById('medName').value,
                    description: document.getElementById('medDesc').value,
                    price: parseFloat(document.getElementById('medPrice').value),
                    stockQuantity: parseInt(document.getElementById('medStock').value),
                    requiresPrescription: document.getElementById('medRx').value === 'true'
                })
            });

            if (res.ok) {
                msg.innerHTML = '<span style="color:green;">✅ Medicine added!</span>';
                document.getElementById('medicineForm').reset();
                loadInventory();
            } else {
                const data = await res.json();
                msg.innerHTML = `<span style="color:red;">❌ ${data.error}</span>`;
            }
        } catch (err) {
            msg.innerHTML = '<span style="color:red;">Server error</span>';
        }
    });

    async function updateStock(id, name, currentStock) {
        const newStock = prompt(`Update stock for ${name}\nCurrent: ${currentStock}`, currentStock);
        if (newStock !== null && !isNaN(newStock)) {
            await fetch(`http://localhost:8080/api/medicines/${id}/stock`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ stockQuantity: parseInt(newStock) })
            });
            loadInventory();
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = '../login.html';
    }

    loadInventory();
</script>
</body>
</html>
