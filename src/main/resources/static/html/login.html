<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MediCare</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
<nav class="navbar">
    <div class="logo-container">
        <img src="../../images/logo.jpg" alt="MediCare Logo" class="logo-img">
        <!--        <span class="logo-text">MediCare</span>-->
    </div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="register.html">Register</a>
    </div>
</nav>

<div class="container" style="max-width: 450px; margin-top: 60px;">
    <div class="card">
        <h2 class="text-center">Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
        </form>
        <p class="text-center mt-20">Don't have an account? <a href="register.html">Register</a></p>
        <div id="errorMsg" style="color:red; text-align:center; margin-top:10px;"></div>
    </div>
</div>
<script src="../../js/config.js"></script>
<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const res = await fetch('http://localhost:8080/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            if (res.ok) {
                localStorage.setItem('user', JSON.stringify(data));

                // Redirect based on role
                const role = data.role;
                if (role === 'PATIENT') window.location.href = 'patient/dashboard.html';
                else if (role === 'DOCTOR') window.location.href = 'doctor/dashboard.html';
                else if (role === 'PHARMACY') window.location.href = 'pharmacy/dashboard.html';
                else if (role === 'ADMIN') window.location.href = 'admin/dashboard.html';
            } else {
                document.getElementById('errorMsg').textContent = data.error || 'Login failed';
            }
        } catch (err) {
            document.getElementById('errorMsg').textContent = 'Server error. Is backend running?';
        }
    });
</script>
</body>
</html>
